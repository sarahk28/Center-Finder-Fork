<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterschool Center Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a6cf7; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 13px;
      margin-top: 24px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a5ce5; }
    button:disabled { background: #aab; cursor: not-allowed; }
    .categories {
      margin-top: 24px;
      padding: 14px;
      background: #f8f9ff;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #555;
    }
    .categories strong { color: #333; display: block; margin-bottom: 6px; }
    .categories ul { padding-left: 18px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Afterschool Center Finder</h1>
    <p class="subtitle">Find afterschool centers near a school and download the results as a CSV.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/generate" onsubmit="this.querySelector('button').disabled=true; this.querySelector('button').textContent='Searching...';">
      <label for="school_name">School / College Name</label>
      <input type="text" id="school_name" name="school_name" placeholder="e.g. Lincoln High School" required value="{{ form.school_name }}">

      <label for="city">City</label>
      <input type="text" id="city" name="city" placeholder="e.g. Atlanta" required value="{{ form.city }}">

      <div class="row">
        <div>
          <label for="state">State</label>
          <input type="text" id="state" name="state" placeholder="e.g. GA" maxlength="2" required value="{{ form.state }}">
        </div>
        <div>
          <label for="zip_code">Zip Code</label>
          <input type="text" id="zip_code" name="zip_code" placeholder="e.g. 30301" maxlength="10" required value="{{ form.zip_code }}">
        </div>
      </div>

      <label for="radius">Search Radius (miles)</label>
      <input type="number" id="radius" name="radius" placeholder="15" min="1" max="100" value="{{ form.radius or 15 }}">

      <button type="submit">Find Centers</button>
    </form>

    <div class="categories">
      <strong>Searches within your chosen radius for:</strong>
      <ul>
        <li>Private afterschool programs</li>
        <li>Elementary schools</li>
        <li>YMCAs &amp; Boys and Girls Clubs</li>
        <li>Public libraries</li>
      </ul>
    </div>
  </div>
</body>
</html>
