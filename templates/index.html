<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterschool Center Finder</title>
  <style>
    .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    .results-table th, .results-table td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
    .called-sidebar { margin-top: 24px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .called-sidebar ul { list-style: none; padding: 0; }
    .called-sidebar li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .warm-tag { background: #ffe6e6; color: #d9534f; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-left: 8px; }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a6cf7; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .error {
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 13px;
      margin-top: 24px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a5ce5; }
    button:disabled { background: #aab; cursor: not-allowed; }
    .categories {
      margin-top: 24px;
      padding: 14px;
      background: #f8f9ff;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #555;
    }
    .categories strong { color: #333; display: block; margin-bottom: 6px; }
    .categories ul { padding-left: 18px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Afterschool Center Finder</h1>
    <p class="subtitle">Find afterschool centers near a school and download the results as a CSV.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/generate" onsubmit="this.querySelector('button').disabled=true; this.querySelector('button').textContent='Searching...';">
      <label for="school_name">School / College Name</label>
      <input type="text" id="school_name" name="school_name" placeholder="e.g. Lincoln High School" required value="{{ form.school_name }}">

      <label for="city">City</label>
      <input type="text" id="city" name="city" placeholder="e.g. Atlanta" required value="{{ form.city }}">

      <div class="row">
        <div>
          <label for="state">State</label>
          <input type="text" id="state" name="state" placeholder="e.g. GA" maxlength="2" required value="{{ form.state }}">
        </div>
        <div>
          <label for="zip_code">Zip Code</label>
          <input type="text" id="zip_code" name="zip_code" placeholder="e.g. 30301" maxlength="10" required value="{{ form.zip_code }}">
        </div>
      </div>

      <label for="radius">Search Radius (miles)</label>
      <input type="number" id="radius" name="radius" placeholder="15" min="1" max="100" value="{{ form.radius or 15 }}">

      <button type="submit">Find Centers</button>
    </form>

    <div class="categories">
      <strong>Searches within your chosen radius for:</strong>
      <ul>
        <li>Private afterschool programs</li>
        <li>Elementary schools</li>
        <li>YMCAs &amp; Boys and Girls Clubs</li>
        <li>Public libraries</li>
      </ul>
    </div>
  </div>
  <script>
  function markAsCalled(checkbox, rowId) {
    const row = document.getElementById(rowId);
    const centerName = row.querySelector('.center-name').innerText;
    const isWarm = row.querySelector('.warm-checkbox').checked;
    const sidebarList = document.getElementById('calledList');

    if (checkbox.checked) {
      row.style.display = 'none';

      const li = document.createElement('li');
      li.setAttribute('data-row-id', rowId);
      li.innerHTML = `
        <span>${centerName} ${isWarm ? '<span class="warm-tag">Warm</span>' : ''}</span>
        <button type="button" onclick="undoCalled('${rowId}')" style="width: auto; padding: 2px 8px; margin: 0; font-size: 0.75rem;">Undo</button>
      `;
      sidebarList.appendChild(li);
    }
  }

  function undoCalled(rowId) {
    const row = document.getElementById(rowId);
    row.style.display = '';
    
    // Uncheck called box in table
    const checkboxes = row.querySelectorAll('input[type="checkbox"]');
    if (checkboxes.length > 1) checkboxes[1].checked = false;

    // Remove from sidebar
    const item = document.querySelector(`li[data-row-id="${rowId}"]`);
    if (item) item.remove();
  }
</script>

</body>
</html>
